<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>自然科學 3D 課程圖譜｜三年級 → 九年級</title>
<meta name="description" content="依 115 學年度康軒、翰林、南一自然科課程架構整併，將國小三年級到國中九年級的課程主題做成 3D 圖譜，並以連結線呈現跨年級知識脈絡。" />
<style>
  :root {
    --panel: rgba(13, 20, 38, .82);
    --line: rgba(120, 150, 210, .25);
    --ink: #e8eefb;
    --muted: #9db0d0;
    --life: #4ade80;
    --chem: #fbbf24;
    --phys: #60a5fa;
    --earth: #f472b6;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    overflow: hidden;
    font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
    background: #060a16;
    color: var(--ink);
  }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }

  .hud {
    position: fixed;
    z-index: 5;
    pointer-events: none;
  }
  .hud > * { pointer-events: auto; }

  #titleBox {
    top: 16px; left: 16px;
    max-width: min(430px, calc(100vw - 32px));
  }
  #titleBox .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 18px;
    backdrop-filter: blur(10px);
    box-shadow: 0 12px 30px rgba(0, 0, 0, .45);
  }
  #titleBox h1 {
    margin: 0 0 4px;
    font-size: 1.25rem;
    letter-spacing: .02em;
  }
  #titleBox p {
    margin: 0;
    color: var(--muted);
    font-size: .82rem;
    line-height: 1.55;
  }

  #legend {
    top: 86px; left: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: flex-start;
  }
  #legendToggle {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: var(--panel);
    color: var(--ink);
    padding: 8px 14px;
    font: inherit;
    font-size: .84rem;
    font-weight: 800;
    cursor: pointer;
    backdrop-filter: blur(10px);
  }
  #legendToggle:hover { border-color: rgba(160, 190, 255, .6); }
  #legendToggle .arrow { transition: transform .2s; font-size: .7rem; }
  #legend.collapsed .arrow { transform: rotate(-90deg); }
  #legend.collapsed .chips { display: none; }
  .chips {
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: stretch;
  }
  .chips .chip { justify-content: flex-start; }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: var(--panel);
    color: var(--ink);
    padding: 6px 12px;
    font: inherit;
    font-size: .82rem;
    font-weight: 700;
    cursor: pointer;
    backdrop-filter: blur(10px);
    transition: transform .15s, border-color .15s, opacity .15s;
  }
  .chip:hover { transform: translateY(-1px); border-color: rgba(160, 190, 255, .6); }
  a.chip { text-decoration: none; color: var(--ink); }
  .chip .dot { width: 10px; height: 10px; border-radius: 50%; background: #fff; }
  .chip.dim { opacity: .38; }
  .chip[data-strand="life"] .dot { background: var(--life); }
  .chip[data-strand="chem"] .dot { background: var(--chem); }
  .chip[data-strand="phys"] .dot { background: var(--phys); }
  .chip[data-strand="earth"] .dot { background: var(--earth); }

  #infoPanel {
    right: 16px; bottom: 16px;
    width: min(340px, calc(100vw - 32px));
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px 18px;
    backdrop-filter: blur(10px);
    box-shadow: 0 12px 30px rgba(0, 0, 0, .45);
    display: none;
  }
  #infoPanel.show { display: block; }
  #infoPanel .grade-tag {
    display: inline-block;
    border-radius: 999px;
    padding: 2px 10px;
    font-size: .75rem;
    font-weight: 800;
    background: rgba(96, 165, 250, .18);
    color: #93c5fd;
    margin-bottom: 6px;
  }
  #infoPanel h2 { margin: 0 0 6px; font-size: 1.15rem; }
  #infoPanel h2 .logo { font-size: 1.5rem; margin-right: 6px; }
  #infoPanel .desc { margin: 0 0 10px; color: var(--muted); font-size: .84rem; line-height: 1.6; }
  #infoPanel .links-title { font-size: .78rem; font-weight: 800; color: #93c5fd; margin-bottom: 4px; }
  #infoPanel ul { margin: 0; padding: 0; list-style: none; }
  #infoPanel li {
    font-size: .82rem;
    padding: 3px 0;
    color: var(--ink);
    cursor: pointer;
  }
  #infoPanel li:hover { color: #93c5fd; }
  #infoPanel li .mini { font-size: .72rem; color: var(--muted); margin-left: 4px; }
  #infoPanel .close {
    position: absolute;
    top: 10px; right: 12px;
    border: 0; background: none;
    color: var(--muted);
    font-size: 1.1rem;
    cursor: pointer;
  }
  #infoPanel { position: fixed; }

  #controlsBar {
    left: 16px; bottom: 16px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    max-width: calc(100vw - 32px);
  }
  #hint {
    position: fixed;
    bottom: 62px; left: 16px;
    z-index: 4;
    color: var(--muted);
    font-size: .74rem;
    pointer-events: none;
    text-shadow: 0 1px 4px #000;
  }
  @media (max-width: 700px) {
    #titleBox h1 { font-size: 1.02rem; }
    #titleBox p { display: none; }
    #hint { display: none; }
  }
</style>
</head>
<body>
<div id="app"></div>

<div class="hud" id="titleBox">
  <div class="card">
    <h1>🗺️ 自然科學 3D 課程圖譜</h1>
  </div>
</div>

<div class="hud" id="legend">
  <button id="legendToggle">🎨 知識脈絡 <span class="arrow">▼</span></button>
  <div class="chips" id="strandChips">
    <button class="chip" data-strand="all"><span class="dot" style="background:#e8eefb"></span>全部脈絡</button>
    <button class="chip" data-strand="life"><span class="dot"></span>生命科學</button>
    <button class="chip" data-strand="chem"><span class="dot"></span>物質與化學</button>
    <button class="chip" data-strand="phys"><span class="dot"></span>物理與能量</button>
    <button class="chip" data-strand="earth"><span class="dot"></span>地球與宇宙</button>
  </div>
</div>

<div class="hud" id="controlsBar">
  <button class="chip" id="btnRotate">⏸️ 暫停旋轉</button>
  <button class="chip" id="btnReset">🎯 重設視角</button>
  <button class="chip" id="btnTop">🔝 俯視圖</button>
  <a class="chip" id="btnFlatMap" href="https://prayer168.github.io/science-course/" target="_blank" rel="noopener">🗺️ 平面課程地圖</a>
  <a class="chip" id="btnCopyright" href="mailto:prayer168@gmail.com">©️ 版權所有：黑熊老師</a>
</div>
<div id="hint">💡 點擊主題節點可看它往上、往下銜接哪些課程</div>

<div id="infoPanel">
  <button class="close" id="infoClose">✕</button>
  <span class="grade-tag" id="infoGrade"></span>
  <h2><span class="logo" id="infoLogo"></span><span id="infoName"></span></h2>
  <p class="desc" id="infoDesc"></p>
  <div class="links-title">🔗 銜接的課程主題</div>
  <ul id="infoLinks"></ul>
</div>

/* ---------- 場景基礎 ---------- */
const container = document.getElementById("app");
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x060a16);
scene.fog = new THREE.Fog(0x060a16, 180, 420);

const camera = new THREE.PerspectiveCamera(52, innerWidth / innerHeight, .1, 1000);
const HOME_POS = new THREE.Vector3(86, 96, 128);
const HOME_TARGET = new THREE.Vector3(0, 48, 0);
camera.position.copy(HOME_POS);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.copy(HOME_TARGET);
controls.enableDamping = true;
controls.dampingFactor = .06;
controls.autoRotate = true;
controls.autoRotateSpeed = .55;
controls.minDistance = 30;
controls.maxDistance = 340;

scene.add(new THREE.AmbientLight(0xffffff, 1.4));
const keyLight = new THREE.DirectionalLight(0xbfd8ff, 1.1);
keyLight.position.set(60, 140, 80);
scene.add(keyLight);

/* 星空背景 */
{
  const starGeo = new THREE.BufferGeometry();
  const N = 1400, pos = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    const r = 260 + Math.random() * 160;
    const th = Math.random() * Math.PI * 2;
    const ph = Math.acos(2 * Math.random() - 1);
    pos[i * 3] = r * Math.sin(ph) * Math.cos(th);
    pos[i * 3 + 1] = r * Math.cos(ph) + 40;
    pos[i * 3 + 2] = r * Math.sin(ph) * Math.sin(th);
  }
  starGeo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({
    color: 0x9db8e8, size: .9, sizeAttenuation: true, transparent: true, opacity: .8
  })));
}

/* ---------- 版面配置：年級為層、脈絡分扇區 ---------- */
const LAYER_GAP = 17;
const RADIUS = 30;
const SECTOR_CENTER = { life: 90, chem: 200, phys: 305, earth: 15 };
const SECTOR_SPAN = 78;

const gradeY = g => (g - 3) * LAYER_GAP;
const nodeById = {};
NODES.forEach(n => nodeById[n.id] = n);

/* 每層每脈絡的節點在該扇區內均分角度 */
{
  const groups = {};
  NODES.forEach(n => {
    const key = n.grade + "_" + n.strand;
    (groups[key] = groups[key] || []).push(n);
  });
  Object.values(groups).forEach(list => {
    list.forEach((n, i) => {
      const center = SECTOR_CENTER[n.strand];
      const off = list.length === 1 ? 0 : (i / (list.length - 1) - .5) * SECTOR_SPAN;
      const a = (center + off) * Math.PI / 180;
      n.pos = new THREE.Vector3(Math.cos(a) * RADIUS, gradeY(n.grade), Math.sin(a) * RADIUS);
    });
  });
}

/* ---------- 年級樓層圓盤與標籤 ---------- */
function makeTextSprite(text, { size = 44, color = "#e8eefb", bg = null, pad = 18 } = {}) {
  const c = document.createElement("canvas");
  const ctx = c.getContext("2d");
  ctx.font = `800 ${size}px "Noto Sans TC","Microsoft JhengHei",sans-serif`;
  const w = ctx.measureText(text).width;
  c.width = Math.ceil(w + pad * 2);
  c.height = size + pad * 2;
  const ctx2 = c.getContext("2d");
  if (bg) {
    ctx2.fillStyle = bg;
    ctx2.beginPath();
    ctx2.roundRect(0, 0, c.width, c.height, 16);
    ctx2.fill();
  }
  ctx2.font = `800 ${size}px "Noto Sans TC","Microsoft JhengHei",sans-serif`;
  ctx2.fillStyle = color;
  ctx2.textAlign = "center";
  ctx2.textBaseline = "middle";
  ctx2.fillText(text, c.width / 2, c.height / 2 + 2);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false }));
  sp.scale.set(c.width / 22, c.height / 22, 1);
  return sp;
}

for (let g = 3; g <= 9; g++) {
  const y = gradeY(g);
  const color = GRADE_COLORS[g];
  const ring = new THREE.Mesh(
    new THREE.RingGeometry(RADIUS - .35, RADIUS + .35, 96),
    new THREE.MeshBasicMaterial({ color, transparent: true, opacity: .28, side: THREE.DoubleSide })
  );
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = y;
  scene.add(ring);

  const disc = new THREE.Mesh(
    new THREE.CircleGeometry(RADIUS, 96),
    new THREE.MeshBasicMaterial({ color, transparent: true, opacity: .045, side: THREE.DoubleSide, depthWrite: false })
  );
  disc.rotation.x = -Math.PI / 2;
  disc.position.y = y;
  scene.add(disc);

  const label = makeTextSprite(GRADE_NAMES[g] + (g <= 6 ? "（國小）" : "（國中）"), {
    size: 40,
    color: "#" + new THREE.Color(color).getHexString(),
    bg: "rgba(8,13,28,.72)"
  });
  label.position.set(-(RADIUS + 13), y + 1.5, 0);
  scene.add(label);
}

/* 中央光柱：串起 3→9 年級的學習軸線 */
{
  const beam = new THREE.Mesh(
    new THREE.CylinderGeometry(.5, .5, gradeY(9) + 8, 24, 1, true),
    new THREE.MeshBasicMaterial({ color: 0x5b8dd6, transparent: true, opacity: .16 })
  );
  beam.position.y = (gradeY(9) + 8) / 2 - 4;
  scene.add(beam);
}

/* ---------- 課程節點：Logo + 主題名稱貼圖 ---------- */
function makeNodeTexture(node) {
  const W = 300, H = 360;
  const c = document.createElement("canvas");
  c.width = W; c.height = H;
  const ctx = c.getContext("2d");
  const strandHex = "#" + new THREE.Color(STRAND_COLORS[node.strand]).getHexString();

  /* Logo 圓形徽章 */
  const cx = W / 2, cy = 120, R = 96;
  const grad = ctx.createRadialGradient(cx, cy, R * .2, cx, cy, R);
  grad.addColorStop(0, "rgba(20,30,58,.98)");
  grad.addColorStop(1, "rgba(10,16,34,.94)");
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2); ctx.fill();
  ctx.lineWidth = 7;
  ctx.strokeStyle = strandHex;
  ctx.beginPath(); ctx.arc(cx, cy, R - 4, 0, Math.PI * 2); ctx.stroke();
  ctx.lineWidth = 2;
  ctx.strokeStyle = "rgba(255,255,255,.35)";
  ctx.beginPath(); ctx.arc(cx, cy, R - 14, 0, Math.PI * 2); ctx.stroke();

  ctx.font = "104px 'Segoe UI Emoji','Noto Color Emoji',sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(node.logo, cx, cy + 8);

  /* 主題名稱膠囊 */
  ctx.font = "800 34px 'Noto Sans TC','Microsoft JhengHei',sans-serif";
  const tw = ctx.measureText(node.name).width;
  const bw = Math.min(W - 8, tw + 44), bh = 62, by = 248;
  ctx.fillStyle = "rgba(8,13,28,.88)";
  ctx.beginPath(); ctx.roundRect(cx - bw / 2, by, bw, bh, 31); ctx.fill();
  ctx.lineWidth = 3;
  ctx.strokeStyle = strandHex;
  ctx.beginPath(); ctx.roundRect(cx - bw / 2 + 2, by + 2, bw - 4, bh - 4, 29); ctx.stroke();
  ctx.fillStyle = "#eef3ff";
  ctx.fillText(node.name, cx, by + bh / 2 + 3);

  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = 4;
  return tex;
}

const sprites = [];
NODES.forEach(node => {
  const mat = new THREE.SpriteMaterial({ map: makeNodeTexture(node), transparent: true, depthWrite: false });
  const sp = new THREE.Sprite(mat);
  sp.scale.set(10, 12, 1);
  sp.position.copy(node.pos);
  sp.position.y += 2.2;
  sp.userData.node = node;
  scene.add(sp);
  node.sprite = sp;
  sprites.push(sp);

  /* 節點落點光暈 */
  const glow = new THREE.Mesh(
    new THREE.CircleGeometry(1.4, 32),
    new THREE.MeshBasicMaterial({ color: STRAND_COLORS[node.strand], transparent: true, opacity: .5, depthWrite: false })
  );
  glow.rotation.x = -Math.PI / 2;
  glow.position.set(node.pos.x, node.pos.y + .06, node.pos.z);
  scene.add(glow);
  node.glow = glow;
});

/* ---------- 連結曲線 ---------- */
const edges = [];
const BASE_EDGE_OPACITY = .42;
LINKS.forEach(([aId, bId]) => {
  const a = nodeById[aId], b = nodeById[bId];
  if (!a || !b) { console.warn("missing node", aId, bId); return; }
  const pa = a.pos.clone().setY(a.pos.y + 2), pb = b.pos.clone().setY(b.pos.y + 2);
  const mid = pa.clone().add(pb).multiplyScalar(.5);
  const outward = mid.clone().setY(0);
  if (outward.lengthSq() < 1) outward.set(1, 0, 0);
  outward.normalize();
  const sameLayer = a.grade === b.grade;
  mid.add(outward.multiplyScalar(sameLayer ? 6 : 10));
  if (sameLayer) mid.y += 5;

  const curve = new THREE.QuadraticBezierCurve3(pa, mid, pb);
  const geo = new THREE.BufferGeometry().setFromPoints(curve.getPoints(40));
  const strand = a.strand === b.strand ? a.strand : b.strand;
  const mat = new THREE.LineBasicMaterial({
    color: STRAND_COLORS[strand],
    transparent: true,
    opacity: BASE_EDGE_OPACITY,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });
  const line = new THREE.Line(geo, mat);
  scene.add(line);
  edges.push({ line, a, b, strand });
});

/* ---------- 互動：點選節點、脈絡篩選 ---------- */
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
let selected = null;
let strandFilter = "all";

const infoPanel = document.getElementById("infoPanel");

function neighborsOf(node) {
  const list = [];
  edges.forEach(e => {
    if (e.a === node) list.push(e.b);
    else if (e.b === node) list.push(e.a);
  });
  return list;
}

function applyVisibility() {
  NODES.forEach(n => {
    const strandOK = strandFilter === "all" || n.strand === strandFilter;
    let op = strandOK ? 1 : .08;
    let glowOp = strandOK ? .5 : .04;
    if (selected) {
      const isSel = n === selected;
      const isNb = neighborsOf(selected).includes(n);
      op = isSel ? 1 : isNb ? .95 : .1;
      glowOp = isSel || isNb ? .6 : .05;
    }
    n.sprite.material.opacity = op;
    n.glow.material.opacity = glowOp;
  });
  edges.forEach(e => {
    const strandOK = strandFilter === "all" || (e.a.strand === strandFilter || e.b.strand === strandFilter);
    let op = strandOK ? BASE_EDGE_OPACITY : .03;
    if (selected) op = (e.a === selected || e.b === selected) ? .95 : .04;
    e.line.material.opacity = op;
  });
}

function showInfo(node) {
  document.getElementById("infoGrade").textContent =
    GRADE_NAMES[node.grade] + (node.grade <= 6 ? "・國小" : "・國中");
  document.getElementById("infoLogo").textContent = node.logo;
  document.getElementById("infoName").textContent = node.name;
  document.getElementById("infoDesc").textContent = node.desc;
  const ul = document.getElementById("infoLinks");
  ul.innerHTML = "";
  const nbs = neighborsOf(node).sort((x, y) => x.grade - y.grade);
  if (!nbs.length) {
    ul.innerHTML = '<li style="color:var(--muted);cursor:default">（此主題暫無標註的銜接線）</li>';
  } else {
    nbs.forEach(nb => {
      const li = document.createElement("li");
      const dir = nb.grade < node.grade ? "⬇️" : nb.grade > node.grade ? "⬆️" : "↔️";
      li.innerHTML = `${dir} ${nb.logo} ${nb.name}<span class="mini">${GRADE_NAMES[nb.grade]}</span>`;
      li.addEventListener("click", () => selectNode(nb, true));
      ul.appendChild(li);
    });
  }
  infoPanel.classList.add("show");
}

function selectNode(node, fly = false) {
  selected = node;
  applyVisibility();
  showInfo(node);
  if (fly) {
    const p = node.pos;
    controls.target.lerp(new THREE.Vector3(p.x * .4, p.y + 2, p.z * .4), 1);
  }
}

function clearSelection() {
  selected = null;
  infoPanel.classList.remove("show");
  applyVisibility();
}

document.getElementById("infoClose").addEventListener("click", clearSelection);

let downXY = null;
renderer.domElement.addEventListener("pointerdown", e => downXY = [e.clientX, e.clientY]);
renderer.domElement.addEventListener("pointerup", e => {
  if (!downXY) return;
  const moved = Math.hypot(e.clientX - downXY[0], e.clientY - downXY[1]);
  downXY = null;
  if (moved > 6) return; /* 是拖曳，不是點擊 */
  pointer.x = (e.clientX / innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(sprites);
  const hit = hits.find(h => h.object.material.opacity > .3);
  if (hit) selectNode(hit.object.userData.node);
  else clearSelection();
});

renderer.domElement.addEventListener("pointermove", e => {
  pointer.x = (e.clientX / innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(sprites);
  renderer.domElement.style.cursor =
    hits.some(h => h.object.material.opacity > .3) ? "pointer" : "grab";
});

/* 脈絡面板摺疊 */
document.getElementById("legendToggle").addEventListener("click", () => {
  document.getElementById("legend").classList.toggle("collapsed");
});

/* 脈絡篩選 */
document.querySelectorAll("#strandChips .chip").forEach(btn => {
  btn.addEventListener("click", () => {
    strandFilter = btn.dataset.strand;
    document.querySelectorAll("#strandChips .chip").forEach(b =>
      b.classList.toggle("dim", strandFilter !== "all" && b.dataset.strand !== strandFilter && b.dataset.strand !== "all"));
    clearSelection();
  });
});

/* 視角控制 */
const btnRotate = document.getElementById("btnRotate");
btnRotate.addEventListener("click", () => {
  controls.autoRotate = !controls.autoRotate;
  btnRotate.textContent = controls.autoRotate ? "⏸️ 暫停旋轉" : "▶️ 自動旋轉";
});
document.getElementById("btnReset").addEventListener("click", () => {
  camera.position.copy(HOME_POS);
  controls.target.copy(HOME_TARGET);
});
document.getElementById("btnTop").addEventListener("click", () => {
  camera.position.set(0, 220, .01);
  controls.target.set(0, 48, 0);
});

addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* ---------- 動畫 ---------- */
const clock = new THREE.Clock();
function tick() {
  requestAnimationFrame(tick);
  const t = clock.getElapsedTime();
  NODES.forEach((n, i) => {
    n.sprite.position.y = n.pos.y + 2.2 + Math.sin(t * 1.1 + i * .7) * .35;
  });
  controls.update();
  renderer.render(scene, camera);
}
applyVisibility();
tick();
</script>
